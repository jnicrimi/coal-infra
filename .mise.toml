[tools]
pnpm = "11.7.0"
node = "24.17.0"
actionlint = "1.7.12"
zizmor = "1.25.2"
gitleaks = "8.30.1"
lefthook = "2.1.9"
terraform = "1.15.6"
tflint = "0.63.1"
aws-cli = "2.35.6"

[tasks.setup]
description = "環境基盤を最新化"
run = ["mise install", "lefthook install", "pnpm install --frozen-lockfile"]

[tasks.yamllint]
description = "YAML を検証"
raw_args = true
run = "uvx --python-preference only-managed yamllint==1.38.0"

[task_config]
includes = ["mise-tasks/tf.toml"]
